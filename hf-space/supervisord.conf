[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
logfile_maxbytes=10MB
loglevel=info
pidfile=/tmp/supervisord.pid

[program:osrm]
command=osrm-routed --algorithm mld --port 5001 --max-table-size 10000 /home/user/osrm-data/map.osrm
autostart=true
autorestart=true
startretries=5
stdout_logfile=/tmp/osrm.log
stdout_logfile_maxbytes=5MB
stderr_logfile=/tmp/osrm-err.log
stderr_logfile_maxbytes=5MB
priority=10

[program:backend]
command=node /home/user/app/backend/dist/server.js
autostart=true
autorestart=true
startretries=5
startsecs=3
stdout_logfile=/tmp/backend.log
stdout_logfile_maxbytes=5MB
stderr_logfile=/tmp/backend-err.log
stderr_logfile_maxbytes=5MB
priority=20
environment=NODE_ENV="production",PORT="7860",OSRM_URL="http://localhost:5001",LOG_LEVEL="info"
